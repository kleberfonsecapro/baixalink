<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#121212">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⬇️</text></svg>">
  <title>Baixe Link</title>
  <script>
    window.__deferredPrompt = null;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      window.__deferredPrompt = e;
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212; color: #e0e0e0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p.sub { color: #888; margin-bottom: 2rem; }
    .card {
      background: #1e1e1e; border-radius: 12px; padding: 1.5rem;
      width: 100%; max-width: 480px; margin-bottom: 1rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #bbb; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.3rem; }
    input, select, button {
      width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #333;
      background: #2a2a2a; color: #e0e0e0; font-size: 1rem; margin-bottom: 0.8rem;
    }
    button {
      background: #1a73e8; color: #fff; border: none; cursor: pointer;
      font-weight: 600; transition: background 0.2s;
    }
    button:hover { background: #1557b0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hidden { display: none; }
    #installBtn {
      background: #2e7d32; margin-top: 1rem; padding: 0.4rem 1rem; width: auto;
      font-size: 0.85rem; display: inline-block;
    }
    #installBtn:hover { background: #1b5e20; }
    .error { color: #cf6679; font-size: 0.9rem; margin-top: 0.5rem; }


  </style>
</head>
<body>
  <h1>⬇️ Baixe Link</h1>
  <p class="sub">Baixe vídeos e áudios do YouTube, Facebook, Instagram e Kwai</p>

  <div class="card" id="loginCard">
    <h2>Login</h2>
    <label for="username">Usuário</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username">
    <label for="password">Senha</label>
    <input type="password" id="password" placeholder="senha" autocomplete="current-password">
    <button id="loginBtn">Entrar</button>
    <p id="loginError" class="error hidden"></p>
  </div>

  <div class="card hidden" id="downloadCard">
    <h2>Novo Download</h2>
    <label for="url">URL do vídeo</label>
    <input type="url" id="url" placeholder="https://youtube.com/watch?v=...">
    <label for="tipo">Tipo</label>
    <select id="tipo">
      <option value="mp4">Vídeo (MP4)</option>
      <option value="mp3">Áudio (MP3)</option>
    </select>
    <button id="downloadBtn">Baixar</button>
    <div id="result" class="hidden"></div>
  </div>

  <button id="installBtn">📲 Adicionar à tela inicial</button>



  <script src="app.js"></script>
</body>
</html>
