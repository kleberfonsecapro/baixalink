services:
  backend:
    build: ./backend
    container_name: baixe-link-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`baixelink.localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=local"
      - "traefik.http.routers.backend.middlewares=strip-api"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    image: nginx:alpine
    container_name: baixe-link-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`baixelink.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=local"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  traefik:
    image: traefik:latest
    container_name: baixe-link-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "9090:9090"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.baixelink.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=local"

volumes:
  letsencrypt:
